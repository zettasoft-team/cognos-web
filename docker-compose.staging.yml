services:
  cognosfm-web:
    build:
      context: .
      args:
        VITE_MODE: staging
        VITE_API_BASE_URL: ""
    container_name: cognosfm-web
    ports:
      - "3010:80"
    environment:
      BACKEND_URL: http://cognosfm-core:8087
    networks:
      - cognosfm-net
    restart: unless-stopped

networks:
  cognosfm-net:
    external: true