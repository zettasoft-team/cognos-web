services:
  cognosfm-web:
    build:
      context: .
      args:
        VITE_MODE: staging
        VITE_API_BASE_URL: ""
    ports:
      - "3010:80"
    environment:
      # 백엔드 서비스명:포트 (같은 네트워크 내에서 서비스명으로 통신)
      BACKEND_URL: http://cognosfm-api:8087
    networks:
      - cognosfm-net
    restart: unless-stopped

networks:
  cognosfm-net:
    external: true
