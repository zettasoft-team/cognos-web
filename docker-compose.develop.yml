services:
  cognosfm-web:
    build:
      context: .
      args:
        VITE_MODE: develop
        VITE_API_BASE_URL: ""
    ports:
      - "3010:80"
    environment:
      BACKEND_URL: http://host.docker.internal:8087
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
