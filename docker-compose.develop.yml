services:
  cognosfm-web:
    build:
      context: .
      args:
        VITE_MODE: develop
        VITE_API_BASE_URL: ""
    ports:
      - "3010:80"
    environment:
      BACKEND_URL: http://cognosfm-core:8087
    networks:
      - cognos-core_default
    restart: unless-stopped

networks:
  cognos-core_default:
    external: true
